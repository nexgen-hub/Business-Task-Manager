services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
      POSTGRES_USER: ${POSTGRES_USER:-taskmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskmanager} -d ${POSTGRES_DB:-taskmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager-django
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-unsafe-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,django}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,http://localhost:4200}
      DB_ENGINE: postgres
      DB_NAME: ${POSTGRES_DB:-taskmanager}
      DB_USER: ${POSTGRES_USER:-taskmanager}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager}
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  angular:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: taskmanager-angular
    restart: unless-stopped
    depends_on:
      - django
    ports:
      - "80:80"

volumes:
  postgres_data:
  static_volume:
