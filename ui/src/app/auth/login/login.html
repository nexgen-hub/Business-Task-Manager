<div class="auth-page">
	<mat-card class="auth-card">
		<mat-card-header>
			<mat-card-title>Welcome Back</mat-card-title>
			<mat-card-subtitle>Sign in to access your dashboard</mat-card-subtitle>
		</mat-card-header>

		<mat-card-content>
			<form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
				<mat-form-field appearance="outline">
					<mat-label>Username</mat-label>
					<input matInput type="text" formControlName="username" autocomplete="username" />
					<mat-error *ngIf="username.hasError('required')">Username is required.</mat-error>
					<mat-error *ngIf="!username.hasError('required') && username.hasError('minlength')">
						Username must be at least 3 characters.
					</mat-error>
				</mat-form-field>

				<mat-form-field appearance="outline">
					<mat-label>Password</mat-label>
					<input
						matInput
						[type]="hidePassword ? 'password' : 'text'"
						formControlName="password"
						autocomplete="current-password"
					/>
					<button
						mat-icon-button
						matSuffix
						type="button"
						(click)="hidePassword = !hidePassword"
						[attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
					>
						<mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
					</button>
					<mat-error *ngIf="password.hasError('required')">Password is required.</mat-error>
					<mat-error *ngIf="!password.hasError('required') && password.hasError('minlength')">
						Password must be at least 6 characters.
					</mat-error>
				</mat-form-field>

				<p class="submit-error" *ngIf="submitError">{{ submitError }}</p>

				<button mat-flat-button color="primary" type="submit" [disabled]="isSubmitting">
					<mat-spinner *ngIf="isSubmitting" [diameter]="18"></mat-spinner>
					<span *ngIf="!isSubmitting">Sign In</span>
				</button>
			</form>
		</mat-card-content>

		<mat-card-actions>
			<a mat-button routerLink="/auth/register">Create an account</a>
		</mat-card-actions>
	</mat-card>
</div>
