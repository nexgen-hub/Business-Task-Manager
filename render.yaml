# Render Blueprint — Business Task Manager
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: A PostgreSQL database named "taskmanager" already exists in your Render account.
# Render will adopt it when this Blueprint is applied to the same workspace.
# If you want Render to create a brand-new database, rename it below.

databases:
  - name: taskmanager
    databaseName: taskmanager_68ba
    user: taskmanager
    plan: free
    region: oregon

services:
  - type: web
    name: taskmanager-api
    env: python
    region: oregon
    plan: free
    repo: https://github.com/ghalemhabibdz/Business-Task-Manager  # update if repo name differs

    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate

    startCommand: gunicorn taskmanager.wsgi:application --bind 0.0.0.0:$PORT --workers 3

    envVars:
      # Django core
      - key: DJANGO_SECRET_KEY
        generateValue: true           # Render generates a secure random value

      - key: DJANGO_DEBUG
        value: "False"

      - key: DJANGO_ALLOWED_HOSTS
        value: taskmanager-api.onrender.com

      - key: CSRF_TRUSTED_ORIGINS
        value: https://taskmanager-api.onrender.com

      # After you deploy the Angular app on Vercel, replace the placeholder below
      # with your real Vercel URL, e.g. https://business-task-manager.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-angular-frontend.vercel.app

      # Python version (also enforced by runtime.txt)
      - key: PYTHON_VERSION
        value: "3.11.9"

      # Database — automatically populated from the database block above
      - key: DB_ENGINE
        value: postgres

      - key: DB_NAME
        fromDatabase:
          name: taskmanager
          property: database

      - key: DB_USER
        fromDatabase:
          name: taskmanager
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: taskmanager
          property: password

      - key: DB_HOST
        fromDatabase:
          name: taskmanager
          property: host

      - key: DB_PORT
        fromDatabase:
          name: taskmanager
          property: port
